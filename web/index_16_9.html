<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <!-- <meta http-equiv="refresh" content="2" > -->
    <title>HTML 5 Boilerplate</title>
    <link rel="stylesheet" href="style_16_9.css">
  </head>
  <body>
  <!-- Display the countdown timer in an element -->

<div id="container">
  <div id="content">
    <video autoplay loop muted>
      <source src="logo.mp4" type="video/mp4">
    </video>
    <div id="demo"></div>
    <p>dpsg-cherusker.de/jubel</p>
  </div>
</div>

<script>
// Set the date we're counting down to
var countDownDate = new Date("Jun 18, 2027 17:00:00").getTime();

// Update the count down every 1 second
var x = setInterval(function() {

  // Get today's date and time
  var now = new Date().getTime();

  // Find the distance between now and the count down date
  var distance = countDownDate - now;

  // Time calculations for days, hours, minutes and seconds
  var days = Math.floor(distance / (1000 * 60 * 60 * 24));
  var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
  var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
  var seconds = Math.floor((distance % (1000 * 60)) / 1000);

  // Display the result in the element with id="demo"
  document.getElementById("demo").innerHTML = "<div>" + days + " <span>Tage</span> " + "</div>" + "<div>" + hours + " <span>Stunden</span> " + "</div>"
  + "<div>" + minutes + " <span>Minuten</span> " + "</div>" + "<div>" + seconds + " <span>Sekunden</span> " + "</div>";

  // If the count down is finished, write some text
  if (distance < 0) {
    clearInterval(x);
    document.getElementById("demo").innerHTML = "EXPIRED";
  }
}, 1000);
</script>
  </body>
</html>
